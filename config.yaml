data:
  file_path: "data/energy_data.csv"
  target_col: "spread_SDAC_IDA1_PL"
  bool_cols:
    - "IS_ACTIVE_DOWN_SDAC_PL"
    - "IS_ACTIVE_UP_SDAC_PL"
  leakage_cols:
    - "spread_SDAC_IDA1_PL"
    - "IDA1_DE"
    - "IDA1_PL"
    - "IDA1_SK"
    - "IDA2_DE"
    - "IDA2_PL"
    - "IDA2_SK"
    - "IDA3_DE"
    - "IDA3_PL"
    - "IDA3_SK"

cv:
  initial_train_days: 270
  train_days: 180
  test_days: 30
  purge_days: 7
  embargo_days: 2
  n_splits: 4

model:
  n_estimators: 70
  max_depth: 2
  learning_rate: 0.1
  subsample: 0.8565
  colsample_bytree: 0.5505
  min_child_weight: 25
  random_state: 42

ensemble:
  enable: true
  models:
    - "xgboost"
    - "random_forest"
    - "extra_trees"
    - "ridge"
  reweight_frequency: 168
  performance_window: 24
  multi_horizon: false

model_params:
  xgboost:
    n_estimators: 70
    max_depth: 2
    learning_rate: 0.1
    subsample: 0.8565
    colsample_bytree: 0.5505
    min_child_weight: 25

  random_forest:
    n_estimators: 100
    max_depth: 4
    min_samples_split: 34
    min_samples_leaf: 5
    max_features: 0.7

  extra_trees:
    n_estimators: 150
    max_depth: 5
    min_samples_split: 19
    min_samples_leaf: 11
    max_features: 0.5

  ridge:
    alpha: 35.1645

trading:
  position_size_mwh: 1
  max_position: 2.0
  cost_per_mwh: 0.5
  min_conviction: 0.8
  skip_hours: [0, 1, 2, 3, 4, 5]
  currency: "EUR"

mlflow:
  experiment_name: "energy_price_prediction"
  run_name: "xgboost_final_tuned"
