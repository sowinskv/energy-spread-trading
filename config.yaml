data:
  file_path: "data/energy_data.csv"
  target_col: "spread_SDAC_IDA1_PL"
  winsor_pct: 0.01
  bool_cols:
    - "IS_ACTIVE_DOWN_SDAC_PL"
    - "IS_ACTIVE_UP_SDAC_PL"
  leakage_cols:
    - "spread_SDAC_IDA1_PL"
    - "IDA1_DE"
    - "IDA1_PL"
    - "IDA1_SK"
    - "IDA2_DE"
    - "IDA2_PL"
    - "IDA2_SK"
    - "IDA3_DE"
    - "IDA3_PL"
    - "IDA3_SK"

cv:
  initial_train_days: 270
  train_days: 180
  test_days: 30
  purge_days: 7
  embargo_days: 2
  n_splits: 4

model:
  n_estimators: 70
  max_depth: 5
  learning_rate: 0.0260
  subsample: 0.6595
  colsample_bytree: 0.8785
  min_child_weight: 50
  random_state: 42

ensemble:
  enable: true
  two_stage: true
  models:
    - "xgboost"
    - "random_forest"
    - "extra_trees"
    - "ridge"
  multi_horizon: false

model_params:
  xgboost:
    n_estimators: 70
    max_depth: 5
    learning_rate: 0.0260
    subsample: 0.6595
    colsample_bytree: 0.8785
    min_child_weight: 50

  random_forest:
    n_estimators: 100
    max_depth: 5
    min_samples_split: 32
    min_samples_leaf: 13
    max_features: log2

  extra_trees:
    n_estimators: 200
    max_depth: 8
    min_samples_split: 34
    min_samples_leaf: 20
    max_features: 0.7

  ridge:
    alpha: 1.9473

trading:
  max_position: 2.0
  cost_per_mwh: 0.5
  min_conviction: 1.2
  skip_hours: [0, 1, 2, 3, 4, 5]
  currency: "EUR"

conformal:
  enable: false # disabled until alpha is tuned against actual residual distribution
  alpha: 0.10 # 90% coverage — too conservative given current prediction noise (~7-8 EUR/MWh)
  cal_days: 21

mlflow:
  experiment_name: "energy_price_prediction"
  run_name: "xgboost_final_tuned"
