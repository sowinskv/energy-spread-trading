data:
  file_path: "data/energy_data.csv"
  target_col: "spread_SDAC_IDA1_PL"
  leakage_cols:
    - "spread_SDAC_IDA1_PL"
    - "IDA1_DE"
    - "IDA1_PL"
    - "IDA1_SK"
    - "IDA2_DE"
    - "IDA2_PL"
    - "IDA2_SK"
    - "IDA3_DE"
    - "IDA3_PL"
    - "IDA3_SK"

cv:
  train_days: 180
  meta_train_days: 60
  test_days: 30
  purge_days: 7
  n_splits: 4

model:
  n_estimators: 200
  max_depth: 10
  learning_rate: 0.0137
  subsample: 0.8195
  colsample_bytree: 0.7700
  random_state: 42

meta_model:
  n_estimators: 50
  max_depth: 5
  learning_rate: 0.0241
  random_state: 42
  confidence_threshold: 0.6331

ensemble:
  enable: true
  models:
    - "xgboost"
    - "lightgbm"
    - "random_forest"
    - "extra_trees"
    - "ridge"
  reweight_frequency: 720 # reweight every 30 days
  performance_window: 48 # use last 2 days for weight calculation
  multi_horizon: true
  horizons: [1, 4, 12, 24] # long horizon configuration

model_params:
  xgboost:
    n_estimators: 200
    max_depth: 10
    learning_rate: 0.0137
    subsample: 0.8195
    colsample_bytree: 0.7700

  lightgbm:
    n_estimators: 90
    max_depth: 4
    learning_rate: 0.0206
    num_leaves: 15
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_samples: 20
    min_split_gain: 0.1

  random_forest:
    n_estimators: 300
    max_depth: 15
    min_samples_split: 3
    min_samples_leaf: 1
    max_features: "sqrt"

  extra_trees:
    n_estimators: 200
    max_depth: 15
    min_samples_split: 3
    min_samples_leaf: 1
    max_features: "sqrt"

  ridge:
    alpha: 1.0

exit_rules:
  enable: false # disable exit rules - they're destroying performance
  max_concurrent_positions: 5
  time_based:
    profit_take_hours: 48 # exit after 48h if profit >= 2%
    profit_take_threshold: 2.0 # minimum profit % for time-based exit
    max_hold_hours: 168 # maximum position age (1 week)
    initial_stop_loss: -8.0 # initial stop loss % (wider for energy volatility)
    stop_loss_decay: -0.02 # gradual tightening per hour
  trailing_stop:
    enable: false # disable trailing stops initially
    initial_stop: 8.0 # % profit before trailing starts
    trail_amount: 3.0 # trailing distance %
  position_management:
    enable_consensus_exits: false # disable consensus exits initially
    confidence_exit_threshold: 0.1 # only exit if confidence very low

trading:
  position_size_mwh: 1
  cost_per_mwh: 0.5
  currency: "EUR" # assumed currency

mlflow:
  experiment_name: "energy_price_prediction"
  run_name: "xgboost_final_tuned"
